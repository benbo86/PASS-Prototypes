<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PASS Prototypes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Barlow', sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #000;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 40px 48px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
    }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 24px; }
    ul { list-style: none; }
    li { border-top: 1px solid #f3f4f6; }
    li:last-child { border-bottom: 1px solid #f3f4f6; }
    a {
      display: block;
      padding: 14px 0;
      font-size: 16px;
      font-weight: 500;
      color: #9a26d6;
      text-decoration: none;
    }
    a:hover { color: #8421b8; }
  </style>
</head>
<body>
  <div class="card">
    <h1>PASS Prototypes</h1>
    <ul>
      <li><a href="./assign-visits-on-holiday/">Holiday &amp; Absence</a></li>
    </ul>
  </div>
</body>
</html>
